# Fly.io configuration for Stonks Trading Dashboard
# Deploy with: fly deploy -c infra/fly.dashboard.toml

app = "stonks-trading-dashboard"
primary_region = "dfw"

[build]
  dockerfile = "infra/Dockerfile.dashboard"

[deploy]
  strategy = "bluegreen"

[env]
  API_BASE_URL = "https://stonks-trading-api.fly.dev"

[http_service]
  internal_port = 8501
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 100
    hard_limit = 250

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

# Optional: Mount a volume for Streamlit cache (if needed)
# [[mounts]]
#   source = "dashboard_cache"
#   destination = "/app/.streamlit/cache"
