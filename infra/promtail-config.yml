server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: stonks-api
    static_configs:
      - targets:
          - localhost
        labels:
          job: stonks-api
          __path__: /app/logs/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            log_type: log_type
            bot_type: bot_type
            bot_instance_id: bot_instance_id
            message: message
      - labels:
          level:
          log_type:
          bot_type:
          bot_instance_id:

  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: varlogs
          __path__: /var/log/*.log
