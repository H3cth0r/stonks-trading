# Docker Compose for Dashboard (Phase 6D)
#
# Standalone dashboard deployment for local testing.
# Connects to the API specified in API_BASE_URL.
#
# Usage:
#   cd infra && docker-compose -f docker-compose.dashboard.yml up -d
#   # Dashboard: http://localhost:8501
#
# To stop:
#   docker-compose -f docker-compose.dashboard.yml down

version: '3.8'

services:
  dashboard:
    build:
      context: ..
      dockerfile: infra/Dockerfile.dashboard
    container_name: stonks-dashboard
    ports:
      - "8501:8501"
    environment:
      # Change this to point to your API
      # For local API: http://host.docker.internal:8000
      # For remote API: https://your-api-domain.com
      - API_BASE_URL=http://host.docker.internal:8000
    volumes:
      - ../src:/app/src:ro  # Mount source for development
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

# No volumes or networks needed for standalone dashboard
